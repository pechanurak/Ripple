<script>
  // Initialize EmailJS with your Public Key
  emailjs.init("zcDJcfPYXdO7v3RZb");

  // Pre-fill message with the project name when arriving from a project detail page
  const projectName = new URLSearchParams(window.location.search).get('project');
  const messageField = document.querySelector('#contactForm textarea[name="message"]');
  const projectTag = document.getElementById('projectTag');
  const projectCheckbox = document.getElementById('projectCheckbox');

  if (projectName) {
    const prefix = `สนใจปรึกษาโครงการ: ${projectName}\n\n`;
    document.getElementById('projectNameLabel').textContent = projectName;
    projectTag.style.display = 'flex';
    messageField.value = prefix;
    messageField.focus();
    messageField.setSelectionRange(prefix.length, prefix.length);

    projectCheckbox.addEventListener('change', () => {
      if (projectCheckbox.checked) {
        if (!messageField.value.startsWith(prefix)) {
          messageField.value = prefix + messageField.value;
        }
      } else if (messageField.value.startsWith(prefix)) {
        messageField.value = messageField.value.slice(prefix.length);
      }
    });
  }

  // Handle form submission
  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    emailjs.sendForm("service_pugj1za", "template_7g39ccq", this)
      .then(function() {
        alert("✓ ส่งข้อความสำเร็จ! ทีมงานจะติดต่อกลับไปในไม่ช้า");
        document.getElementById("contactForm").reset();
      }, function(error) {
        alert("✗ ส่งข้อความล้มเหลว: " + error.text);
      });
  });
</script>
